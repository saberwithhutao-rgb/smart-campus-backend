spring:
  # 数据源配置 - 全部从环境变量读取
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_campus
    username: smartcampus_app
    password: ${DB_PASSWORD}  # ✅ 从环境变量读取
    hikari:
      pool-name: SmartCampusHikariPool
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      #      connection-test-query: SELECT 1
      data-source-properties:
        ssl: false
        socketTimeout: 30
        loginTimeout: 10
        tcpKeepAlive: true
        readOnly: false

  # JPA配置（不变）
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # 邮件配置 - 全部从环境变量读取
  mail:
    host: ${MAIL_HOST:gz-smtp.qcloudmail.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:noreply@55kjikj.xyz}
    password: ${MAIL_PASSWORD}  # ✅ 从环境变量读取，去掉默认值
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  # Redis配置（不变）
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      database: 1

  # 文件上传配置（不变）
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

# 服务器配置（不变）
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path:

# 日志配置（不变）
logging:
  level:
    root: INFO
    com.zaxxer.hikari: DEBUG
    org.postgresql: INFO
    org.postgresql.jdbc: INFO
    com.smartcampus: DEBUG
    com.smartcampus.controller.AiQaController: TRACE
    org.springframework.web: DEBUG
    org.springframework.web.multipart: TRACE
    org.springframework.web.multipart.support: TRACE
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  file:
    name: /var/log/smart-campus/backend-detailed.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# JWT配置 - 从环境变量读取
jwt:
  secret: ${JWT_SECRET}  # ✅ 从环境变量读取，去掉默认值
  expiration: 86400000

# AI相关配置
ai:
  qianwen:
    api-key: ${AI_QIANWEN_API_KEY}  # ✅ 从环境变量读取，去掉默认值
    api-url: ${AI_QIANWEN_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    timeout: 90000
    model: qwen-max

  embedding:
    model: text-embedding-v2
    chunk-size: 500
    chunk-overlap: 50

  rag:
    chunk-size: 500
    chunk-overlap: 50
    top-k: 3
    similarity-threshold: 0.7
  task:
    timeout: 300000
    max-concurrent: 10
  context:
    max-history: 5

# 文件上传配置（不变）
file:
  upload:
    max-size: 50MB
    allowed-types: pdf,doc,docx,txt,xls,xlsx,pptx,jpg,jpeg,png
    storage:
      location: /opt/smart-campus/uploads

# 监控配置（不变）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      db:
        enabled: true